<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HAYA or LOWA </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --ink:      #0f0f14;
      --ink2:     #6b6b80;
      --ink3:     #a8a8be;
      --border:   #e4e4ef;
      --surface:  #f6f6fb;
      --white:    #ffffff;
      --blue:     #1a4fff;
      --blue-lt:  #e8eeff;
      --red:      #d93838;
      --red-lt:   #ffeaea;
      --green:    #14a05e;
      --green-lt: #e6f9f0;
      --amber:    #c97b00;
      --amber-lt: #fff7e0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--ink);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── subtle grid bg ──────────────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 44px 44px;
      opacity: 0.35;
      pointer-events: none;
    }

    #app { position: relative; z-index: 1; }

    /* ─── TOPNAV ──────────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--ink);
    }
    .nav-logo span { color: var(--blue); font-style: italic; }

    .nav-right { display: flex; gap: 10px; align-items: center; }

    /* ─── PAGE WRAPPER ────────────────────────────────────── */
    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ─── TYPOGRAPHY ──────────────────────────────────────── */
    .display {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(40px, 6vw, 72px);
      letter-spacing: -2px;
      line-height: 0.95;
      color: var(--ink);
    }
    .display em { font-style: italic; color: var(--blue); }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink3);
    }

    /* ─── CARD ────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }

    .card-flush {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    /* ─── BUTTON ──────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 22px;
      border-radius: 10px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; width: 100%;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.15s;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(15,15,20,0.12);
    }
    .btn:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-blue  { background: var(--blue);  color: #fff; }
    .btn-ink   { background: var(--ink);   color: #fff; }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--ink); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
    .btn-red   { background: var(--red);   color: #fff; }
    .btn-sm    { padding: 8px 16px; font-size: 13px; width: auto; border-radius: 8px; }

    /* ─── INPUT ───────────────────────────────────────────── */
    .inp {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 15px; text-align: center;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .inp:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,79,255,0.1); }
    .inp::placeholder { color: var(--ink3); }
    .inp:disabled { opacity: 0.3; }
    .inp-xl { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: 6px; }

    /* ─── DIVIDER ─────────────────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--ink3); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ─── STACK ───────────────────────────────────────────── */
    .stack { display: flex; flex-direction: column; gap: 12px; }

    /* ─── CODE BOX ────────────────────────────────────────── */
    .code-box {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      background: var(--surface);
    }
    .code-box .lbl { font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--ink3); margin-bottom: 10px; }
    .code-val {
      font-family: 'Playfair Display', serif;
      font-size: 56px; font-weight: 900;
      letter-spacing: 10px; color: var(--blue);
      line-height: 1;
    }

    /* ─── PILL ────────────────────────────────────────────── */
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 99px;
      font-size: 12px; font-weight: 600;
    }
    .pill-green { background: var(--green-lt); color: var(--green); border: 1px solid #a3e9c7; }
    .pill-red   { background: var(--red-lt);   color: var(--red);   border: 1px solid #f5b8b8; }
    .pill-blue  { background: var(--blue-lt);  color: var(--blue);  border: 1px solid #b3c8fb; }
    .pill-amber { background: var(--amber-lt); color: var(--amber); border: 1px solid #f5d98a; }

    /* ─── TIMER ───────────────────────────────────────────── */
    .timer-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .timer-fill  { height: 100%; border-radius: 99px; background: var(--blue); transition: width 1s linear, background 1s; }
    .timer-fill.warn   { background: var(--amber); }
    .timer-fill.danger { background: var(--red); }

    .timer-num {
      font-family: 'Playfair Display', serif;
      font-size: 40px; font-weight: 900;
      color: var(--ink); line-height: 1;
      transition: color 0.3s;
    }
    .timer-num.danger { color: var(--red); }

    /* ─── GAME GRID ───────────────────────────────────────── */
    .game-grid {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      align-items: start;
    }
    @media(max-width:700px) { .game-grid { grid-template-columns: 1fr; } }

    /* ─── HISTORY PANEL ───────────────────────────────────── */
    .history-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .history-scroll { max-height: 420px; overflow-y: auto; }
    .history-scroll::-webkit-scrollbar { width: 4px; }
    .history-scroll::-webkit-scrollbar-track { background: transparent; }
    .history-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .h-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center; gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }
    .h-item:last-child { border-bottom: none; }

    .h-num {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
      color: var(--ink);
    }
    .h-player { font-size: 11px; font-weight: 600; color: var(--ink3); }

    .h-badge {
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      padding: 3px 8px; border-radius: 6px;
    }
    .h-low  { background: var(--blue-lt);  color: var(--blue);  }
    .h-high { background: var(--red-lt);   color: var(--red);   }
    .h-win  { background: var(--green-lt); color: var(--green); }

    .h-empty {
      padding: 28px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--ink3);
    }

    /* ─── FEEDBACK ────────────────────────────────────────── */
    .feedback-strip {
      border-radius: 10px;
      padding: 14px 18px;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }
    .fb-low  { background: var(--blue-lt);  color: var(--blue); }
    .fb-high { background: var(--red-lt);   color: var(--red);  }
    .fb-timeout { background: var(--amber-lt); color: var(--amber); }

    /* ─── RANGE SLIDER ────────────────────────────────────── */
    .slider-row { display: flex; align-items: center; gap: 12px; }
    input[type=range] {
      -webkit-appearance: none; flex: 1; height: 5px;
      background: var(--border); border-radius: 99px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      background: var(--blue); border-radius: 50%; cursor: pointer;
      box-shadow: 0 2px 8px rgba(26,79,255,0.35);
    }
    .slider-val {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
      color: var(--blue); min-width: 44px; text-align: right;
    }

    /* ─── WINNER ──────────────────────────────────────────── */
    .winner-num {
      font-family: 'Playfair Display', serif;
      font-size: 80px; font-weight: 900;
      color: var(--blue); line-height: 1;
      text-align: center;
    }

    /* ─── WAITING PULSE ───────────────────────────────────── */
    .dot { width:8px; height:8px; border-radius:50%; background:currentColor; display:inline-block; }
    .pulse { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }

    .fade-in { animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    .shake { animation: shake 0.38s ease; }

    /* ─── TOAST ───────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: #fff;
      padding: 11px 24px; border-radius: 99px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 9999;
    }
    #toast.show { opacity: 1; }

    /* ─── HOME HERO ───────────────────────────────────────── */
    .home-hero {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 48px;
      align-items: center;
      min-height: calc(100vh - 60px);
    }
    @media(max-width:760px) {
      .home-hero { grid-template-columns: 1fr; min-height: auto; padding-top: 32px; }
      .hero-left p { display: none; }
    }

    .hero-left p {
      margin-top: 20px;
      font-size: 17px;
      color: var(--ink2);
      max-width: 380px;
      line-height: 1.65;
    }

    .hero-rule {
      width: 48px; height: 3px;
      background: var(--blue);
      border-radius: 99px;
      margin-bottom: 24px;
    }

    /* player tag top-right inside game */
    .player-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 12px; font-weight: 600;
      color: var(--ink2);
    }

    /* range info note */
    .range-note {
      background: var(--blue-lt);
      border: 1px solid #b3c8fb;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--blue);
      text-align: center;
      font-weight: 500;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- sticky nav -->
  <nav>
    <div class="nav-logo">HAYA<span>LOWA</span></div>
    <div class="nav-right" id="navRight"></div>
  </nav>

  <div class="page">
    <div id="screen"></div>
  </div>
</div>

<div id="toast"></div>
<script src="/static/app.js"></script>
</body>
</html>
